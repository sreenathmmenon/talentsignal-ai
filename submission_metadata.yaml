ai_usage_summary: |
  Used AI assistance for planning, code generation support, review, and documentation.
  The final ranking command is deterministic, local, CPU-only, and makes no hosted LLM/API calls.

methodology_summary: |
  Evidence-based deterministic ranker for the Redrob Senior AI Engineer JD. The system converts the JD into a scorecard, extracts source-separated evidence from profile/career/skills/Redrob signals, scores candidates across technical fit, career fit, seniority, logistics, behavior, and trust, applies risk penalties for keyword-stuffing and weak evidence, then writes grounded top-100 reasoning. The final command is CPU-only, offline, standard-library Python, and completes well inside the 5-minute limit.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true

